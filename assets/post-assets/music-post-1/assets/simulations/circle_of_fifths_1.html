<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Circle of Fifths (Mathematica → JS)</title>
<style>
  body {
    margin: 0;
    background: #111;
    color: #eee;
    text-align: center;
    font-family: sans-serif;
  }
  canvas {
    display: block;
    width: min(100vw, 500px);
    height: auto;
    margin: 0 auto;
    touch-action: manipulation;
  }
</style>
</head>
<body>

<canvas id="canvas" width="500" height="500"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const cx = canvas.width / 2;
const cy = canvas.height / 2;

const innerR = 120;
const outerR = 180;

// --- Notes (same as Mathematica)
const notes = ["C","G","D","A","E","B","F#","C#","G#","D#","A#","F"];
const notesR = [notes[0], ...notes.slice(1).reverse()];

// --- Colors (same gradient)
const colors = [
  "#0000ff","#007fff","#00ffff","#00ff7f","#00ff00","#7fff00",
  "#ffff00","#ff7f00","#ff0000","#ff007f","#ff00ff","#7f00ff"
];

// --- Frequency mapping (equal temperament)
const baseFreq = 261.63; // C4
const noteIndex = {
  "C":0,"C#":1,"D":2,"D#":3,"E":4,"F":5,
  "F#":6,"G":7,"G#":8,"A":9,"A#":10,"B":11
};

function getFreq(note){
  return baseFreq * Math.pow(2, noteIndex[note]/12);
}

// --- Draw sector
function drawSector(i) {
  const angleStart = ((i*30 - 15) * Math.PI/180) + Math.PI/2;
  const angleEnd   = ((i*30 + 15) * Math.PI/180) + Math.PI/2;

  ctx.beginPath();
  ctx.arc(cx, cy, outerR, angleStart, angleEnd);
  ctx.arc(cx, cy, innerR, angleEnd, angleStart, true);
  ctx.closePath();

  ctx.fillStyle = colors[i];
  ctx.fill();

  // label
  const angleMid = (angleStart + angleEnd)/2;
  const x = cx + 150 * Math.cos(angleMid);
  const y = cy + 150 * Math.sin(angleMid);

  ctx.fillStyle = "white";
  ctx.font = "16px sans-serif";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angleMid + Math.PI/2);
  ctx.fillText(notesR[i], 0, 0);
  ctx.restore();
}

// --- Draw all
function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(let i=0;i<12;i++) drawSector(i);
}

draw();

// --- Click detection
canvas.addEventListener("click", async function(e){
  if (audioCtx.state === "suspended") {
    await audioCtx.resume();
  }
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left - cx;
  const y = e.clientY - rect.top - cy;

  const r = Math.sqrt(x*x + y*y);
  if (r < innerR || r > outerR) return;

  let angle = Math.atan2(y,x) - Math.PI/2;
  if (angle < 0) angle += 2*Math.PI;

  const index = Math.floor(angle / (2*Math.PI/12));

  playSound(notesR[index]);
});

// --- Web Audio (simple guitar-like tone)
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(note){
  const freq = getFreq(note);

  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  osc.type = "triangle"; // softer than sine
  osc.frequency.value = freq;

  gain.gain.setValueAtTime(0.65, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1);

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start();
  osc.stop(audioCtx.currentTime + 1);
}

window.addEventListener("touchstart", () => {
  if (audioCtx.state === "suspended") audioCtx.resume();
}, { once: true });
</script>

</body>
</html>
